<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Entrada</title>
    <style>
        body { font-family: sans-serif; margin: 50px; background-color: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 10px; max-width: 400px; margin: auto; }
        h2 { color: #00723F; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background: #00723F; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 5px; font-size: 16px; }
        .back { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Nueva Entrada</h2>
        <form action="/ingreso" method="POST">
            <label>Número de Placa:</label>
            <input type="text" name="placa" required placeholder="Ej: 7-ABC-123">
            
            <label>Tipo de Vehículo:</label>
            <select name="tipo">
                <option value="1">Automóvil</option>
                <option value="2">Motocicleta</option>
            </select>
            
            <button type="submit">Generar Ticket</button>
        </form>
        <a href="/" class="back">← Volver al inicio</a>
    </div>
</body>
</html>
