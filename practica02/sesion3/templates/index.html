<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Estacionamiento FIAD</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #00723F; } /* Verde UABC */
        .section { border-bottom: 1px solid #ddd; padding: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { margin-bottom: 10px; padding: 8px; width: 200px; }
        button { background: #00723F; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        button:hover { background: #005a32; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sistema de Estacionamiento - Práctica 02</h1>
        
        <div class="section">
            <h2>Registrar Entrada</h2>
            <form action="/ingreso" method="POST">
                <label>Placa del Vehículo:</label>
                <input type="text" name="placa" placeholder="Ej: ABC-123" required>
                
                <label>Tipo de Vehículo:</label>
                <select name="tipo">
                    <option value="1">Automóvil</option>
                    <option value="2">Motocicleta</option>
                </select>
                <br>
                <button type="submit">Ingresar Vehículo</button>
            </form>
        </div>

        <div class="section">
            <h2>Registrar Salida y Cobro</h2>
            <form action="/cobro" method="POST">
                <label>ID del Ticket:</label>
                <input type="number" name="id" placeholder="Ej: 1" required>
                
                <label>Horas de estancia:</label>
                <input type="number" step="0.1" name="horas" placeholder="Ej: 2.5" required>
                <br>
                <button type="submit">Calcular y Salir</button>
            </form>
        </div>
    </div>
</body>
</html>
